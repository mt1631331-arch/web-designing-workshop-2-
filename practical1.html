<!DOCTYPE html>
<html>
<head>
    <title>Number Pattern Generator</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
        }
        input, button {
            padding: 10px;
            font-size: 16px;
        }
        pre {
            font-size: 18px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h2>Number Pattern Generator</h2>

    <input type="number" id="num" placeholder="Enter N">
    <button onclick="generatePattern()">Generate</button>

    <pre id="output"></pre>

    <script>
        function generatePattern() {
            let n = document.getElementById("num").value;
            let result = "";

            for (let i = 1; i <= n; i++) {
                for (let j = 1; j <= i; j++) {
                    result +=j;
                }
                result += "\n";
            }

            document.getElementById("output").textContent = result;
        }
    </script>

</body>
</html>
